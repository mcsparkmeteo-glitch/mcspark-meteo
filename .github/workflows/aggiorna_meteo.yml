name: Aggiornamento Automatico McSpark Meteo

on:
  push:
    branches: [main]
  schedule:
    - cron: '17 7 * * *'
    - cron: '15 16 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Installa dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Genera mappa meteo
        env:
          WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}
        run: python meteo.py

      - name: Commit e push modifiche
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add index.html day1.html day2.html day3.html

          git diff --cached --quiet && echo "Nessuna modifica da pushare" && exit 0

          git commit -m "🌤 Aggiornamento automatico meteo"
          git push
