name: Aggiornamento Automatico McSpark Meteo

on:
  push:
    branches:
      - main
  schedule:
   - cron: '30 4,10,16 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Controlla il codice del repository
      uses: actions/checkout@v3

    - name: Configura Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Installa le librerie
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Esegui lo script Meteo
      env:
        WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}
      run: python meteo.py

    - name: Salva e pubblica i cambiamenti su GitHub Pages
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "actions@github.com"
        git add index.html
        git commit -m "Aggiornamento forzato dati meteo" || echo "Nessuna modifica"
        git push
